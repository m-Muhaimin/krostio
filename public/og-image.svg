<?xml version="1.0" encoding="UTF-8"?>
<!--
  Krost Open Graph image — 1200×630.
  Editorial layout: large "K." mark left, monumental headline right.
  Matches landing-page hero typography.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Mono category eyebrow -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" fill="#75758a" letter-spacing="2">
    <circle cx="80" cy="92" r="3" fill="#ff7759"/>
    <text x="96" y="98">DECENTRALIZED CREDIT SCORING</text>
  </g>

  <!-- Large K. monogram, left -->
  <g>
    <text x="80" y="430"
      font-family="'Space Grotesk', 'Inter', ui-sans-serif, system-ui, sans-serif"
      font-size="360"
      font-weight="500"
      letter-spacing="-18"
      fill="#17171c">K</text>
    <circle cx="350" cy="410" r="28" fill="#ff7759"/>
  </g>

  <!-- Hero copy, right column -->
  <g font-family="'Space Grotesk', 'Inter', ui-sans-serif, system-ui, sans-serif" fill="#17171c">
    <text x="540" y="290" font-size="64" font-weight="500" letter-spacing="-1.2">Your gig income</text>
    <text x="540" y="362" font-size="64" font-weight="500" letter-spacing="-1.2">is real. We make</text>
    <text x="540" y="434" font-size="64" font-weight="500" letter-spacing="-1.2">lenders see it.</text>
  </g>

  <!-- Footer rule + brand wordmark -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#d9d9dd" stroke-width="1"/>
  <text x="80" y="582"
    font-family="'Space Grotesk', 'Inter', ui-sans-serif, system-ui, sans-serif"
    font-size="22"
    font-weight="500"
    letter-spacing="-0.4"
    fill="#17171c">Krost</text>
  <text x="1120" y="582"
    text-anchor="end"
    font-family="'JetBrains Mono', ui-monospace, monospace"
    font-size="14"
    letter-spacing="1.5"
    fill="#75758a">KROST.XYZ</text>
</svg>
